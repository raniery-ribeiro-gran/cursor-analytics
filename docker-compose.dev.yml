# Desenvolvimento: código montado no container + hot-reload (sem rebuild a cada mudança)
# Credenciais vêm do arquivo .env montado em /app/.env (src/lib/env.ts).
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    environment:
      SQLITE_PATH: /app/data/cursor-analytics.db
    volumes:
      - .:/app
      - ./data:/app/data
      - app_node_modules:/app/node_modules
      - app_next_cache:/app/.next
    restart: unless-stopped

volumes:
  app_node_modules:
  app_next_cache:
